apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: infisical-charts
  namespace: infisical-operator
spec:
  interval: 1h
  url: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: secrets-operator
  namespace: infisical-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: secrets-operator
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: infisical-charts
        namespace: infisical-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infisical-auth-reviewer
  namespace: infisical-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infisical-auth-reviewer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: infisical-auth-reviewer
  namespace: infisical-operator
