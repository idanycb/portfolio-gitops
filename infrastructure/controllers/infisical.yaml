---
apiVersion: v1
kind: Namespace
metadata:
  name: infisical
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: infisical-helm-charts
  namespace: infisical
spec:
  interval: 1h
  url: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: secrets-operator
  namespace: infisical
spec:
  interval: 1h
  chart:
    spec:
      chart: secrets-operator
      version: "0.10.29"
      sourceRef:
        kind: HelmRepository
        name: infisical-helm-charts
        namespace: infisical
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infisical-auth
  namespace: infisical
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: role-tokenreview-binding
  namespace: infisical
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: infisical-auth
    namespace: infisical
