---
apiVersion: v1
kind: Namespace
metadata:
  name: traefik
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 24h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 12h
  chart:
    spec:
      chart: traefik
      version: "39.0.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  values:
    service:
      enabled: true
      single: true
      type: ClusterIP
    providers:
      kubernetesGateway:
        enabled: true
      kubernetesCRD:
        enabled: false
      kubernetesIngress:
        enabled: false

    gatewayClass:
      enabled: true
      name: traefik

    gateway:
      enabled: true
      name: traefik-gateway
      listeners:
        web:
          port: 80
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: All
        websecure:
          port: 443
          protocol: HTTPS
          certificateRefs:
            - name: wildcard-danycb-tech-tls
          allowedRoutes:
            namespaces:
              from: All

    ports:
      web:
        port: 80
        expose:
          default: true
        exposedPort: 80
      websecure:
        port: 443
        expose:
          default: true
        exposedPort: 443

    deployment:
      replicas: 2

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 512Mi
