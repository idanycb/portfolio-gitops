apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: findoc-analyzer-root
  namespace: doc-analyzer
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - "doc-analyzer.danycb.tech"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
