apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: findoc-analyzer-root
  namespace: doc-analyzer
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - "doc-analyzer.danycb.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: demo-rate-limit
      backendRefs:
        - name: frontend
          port: 80
