---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: backend
  namespace: doc-analyzer
spec:
  image: ghcr.io/idanycb/findoc-rag-backend
  interval: 5h
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: backend-policy
  namespace: doc-analyzer
spec:
  imageRepositoryRef:
    name: backend
  policy:
    alphabetical: {}
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: backend-update
  namespace: doc-analyzer
spec:
  interval: 30m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  git:
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: "Update backend image to {{ .NewImage }}"
  update:
    path: "./apps/doc-analyzer/backend"
    strategy: Setters
