---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-portfolio
  namespace: flux-system
spec:
  interval: 10m
  path: "./apps/portfolio"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-doc-analyzer
  namespace: flux-system
spec:
  interval: 10m
  path: "./apps/doc-analyzer"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
